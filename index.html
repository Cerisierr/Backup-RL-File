<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Backup RL Files</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<canvas id="bg"></canvas>

<div id="popup" class="popup" style="display:none;">

    <div class="popup-box">

        <h2>Important</h2>

        <p>
            Search using the file name,<br>
            NOT the in-game item name.
        </p>

        <button onclick="closePopup()">
            I understand
        </button>

    </div>

</div>

<div class="container">

    <h1>Backup RL Files</h1>

    <div class="topbar">

        <input
            type="text"
            id="search"
            placeholder="Search a file..."
        >

        <select id="filter">

            <option value="all">
                All
            </option>

            <option value="Wheels">
                Wheels
            </option>

            <option value="Rocket Boost">
                Boost
            </option>

            <option value="Decal">
                Decal
            </option>

            <option value="Goal Explosion">
                Goal Explosion
            </option>

            <option value="Trail">
                Trail
            </option>

            <option value="Body">
                Body
            </option>

            <option value="Antenna">
                Antenna
            </option>

            <option value="Topper">
                Topper
            </option>

        </select>

    </div>

    <p id="resultCount"></p>

    <div id="files"></div>

</div>

<a href="https://discord.gg/mYnjBwraQQ"
   target="_blank"
   class="discord-button">
    Discord
</a>

<div class="credit">
    By Cerisierr_ for RocketSwap
</div>


<script>

function closePopup() {

    document.getElementById('popup').style.display = 'none';
}

window.addEventListener('load', () => {

    document.getElementById('popup').style.display = 'flex';
});

const canvas = document.getElementById('bg');

const ctx = canvas.getContext('2d');

let width;
let height;

let points = [];

function resize() {

    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);

resize();

for (let i = 0; i < 120; i++) {

    points.push({

        x: Math.random() * width,
        y: Math.random() * height,

        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4
    });
}

function animate() {

    ctx.clearRect(0, 0, width, height);

    for (let p of points) {

        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > width) p.vx *= -1;
        if (p.y < 0 || p.y > height) p.vy *= -1;

        ctx.beginPath();

        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);

        ctx.fillStyle = '#6366f1';

        ctx.fill();
    }

    for (let i = 0; i < points.length; i++) {

        for (let j = i + 1; j < points.length; j++) {

            const dx = points[i].x - points[j].x;
            const dy = points[i].y - points[j].y;

            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 140) {

                ctx.beginPath();

                ctx.moveTo(points[i].x, points[i].y);
                ctx.lineTo(points[j].x, points[j].y);

                ctx.strokeStyle =
                    `rgba(99,102,241,${1 - dist / 140})`;

                ctx.lineWidth = 1;

                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(animate);
}

animate();

</script>

<script src="script.js"></script>

</body>
</html>
